<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NYT Connections Helper</title>
    <link rel="icon" href="../../icons/icon-32.png">
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="popup-header">
        <img class="logo-mark" src="../../assets/logo.svg" alt="" aria-hidden="true" width="44" height="44">
        <div>
          <h1>NYT Connections Helper</h1>
          <p class="subtitle">Active categories</p>
        </div>
      </header>
      <div id="category-list" class="category-list"></div>
      <p id="status" class="status" aria-live="polite"></p>
      <div class="actions">
        <button id="open-settings" type="button">Open settings</button>
        <button id="restore-defaults" type="button">Restore defaults</button>
      </div>
    </main>
    <script src="../shared/defaults.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
